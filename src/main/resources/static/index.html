<div class="bg-white/10 backdrop-blur-xl border border-white/30 shadow-xl rounded-2xl p-8 w-full max-w-4xl">
    <h2 class="text-6xl font-bold mb-6 text-center bg-gradient-to-r from-blue-600 to-indigo-900/90 bg-clip-text text-transparent drop-shadow-sm">Customer </h2>

    <!-- Form -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <input type="text" id="name" placeholder="Name"
               class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

        <input type="number" id="age" placeholder="Age" min="1" max="110"
               class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

        <input type="email" id="email" placeholder="Email"
               class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

        <button onclick="saveCustomer()"
                class="bg-blue-600/60 text-white rounded-lg px-4 py-2 hover:bg-blue-700 transition">
            Add / Update
        </button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full border rounded-lg overflow-hidden">
            <thead class="bg-blue-600/60 backdrop-blur-sm text-blue-900">
            <tr>
                <th class="p-3 text-left">ID</th>
                <th class="p-3 text-left">Name</th>
                <th class="p-3 text-left">Age</th>
                <th class="p-3 text-left">Email</th>
                <th class="p-3 text-left">Actions</th>
            </tr>
            </thead>
            <tbody id="customerTableBody" class="bg-transparent text-grey-800"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
